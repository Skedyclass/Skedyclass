{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iniciar Sesión — SkedyClass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&family=Lora:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--indigo:#6366f1;--purple:#8b5cf6;--pink:#ec4899;--text:#f1f0ff;--muted:#9ca3af}
html,body{height:100%;font-family:'Lora',Georgia,serif}

/* ── Background ── */
body{background:#030308;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0}
.bg::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(99,102,241,.15) 1px,transparent 1px);
  background-size:36px 36px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
}
.orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;will-change:transform}
.orb1{width:700px;height:700px;background:rgba(99,102,241,.09);top:-220px;left:-220px;animation:drift 22s ease-in-out infinite}
.orb2{width:600px;height:600px;background:rgba(236,72,153,.07);bottom:-200px;right:-180px;animation:drift 28s ease-in-out infinite reverse;animation-delay:-9s}
.orb3{width:420px;height:420px;background:rgba(139,92,246,.07);top:45%;left:50%;margin-left:-210px;animation:drift 17s ease-in-out infinite;animation-delay:-4s}
@keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-28px)}66%{transform:translate(-28px,36px)}}

/* ── Layout ── */
.page{position:relative;z-index:1;height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

/* ── Card ── */
.card{
  width:100%;max-width:420px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border-radius:28px;padding:46px 42px;
  box-shadow:0 0 0 1px rgba(255,255,255,.1),0 24px 64px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);
  animation:card-in .55s cubic-bezier(.22,1,.36,1) both;
}
@keyframes card-in{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}

/* ── Brand ── */
.brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:34px}
.brand-logo{width:60px;height:60px;border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(99,102,241,.4);background:linear-gradient(135deg,var(--indigo),var(--pink));display:flex;align-items:center;justify-content:center}
.brand-logo img{width:100%;height:100%;object-fit:contain}
.brand-name{font-family:'Playfair Display',serif;font-size:1.65rem;font-weight:900;color:#fff;letter-spacing:-.5px}
.brand-name .blue{color:var(--indigo)}.brand-name .pink{color:var(--pink)}
.brand-sub{font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:1.2px;text-transform:uppercase}

/* ── Google button ── */
.btn-google{
  position:relative;width:100%;display:flex;align-items:center;justify-content:center;gap:11px;
  background:rgba(255,255,255,.07);
  color:#f0edff;border-radius:14px;padding:13px 20px;
  font-size:.9rem;font-weight:700;font-family:'Inter',sans-serif;
  cursor:pointer;text-decoration:none;
  box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
  transition:transform .15s,background .2s,box-shadow .2s;
  border:1px solid rgba(255,255,255,.11);
  overflow:hidden;
}
.btn-google::before{
  content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;
  background:linear-gradient(135deg,#4285F4,#34A853 40%,#FBBC05 70%,#EA4335);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;opacity:.7;transition:opacity .2s;
}
.btn-google:hover{background:rgba(255,255,255,.11);transform:translateY(-1px);box-shadow:0 8px 28px rgba(66,133,244,.3)}
.btn-google:hover::before{opacity:1}
.g-logo{width:19px;height:19px;flex-shrink:0;background:#fff;border-radius:50%;padding:2px}

/* ── Divider ── */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.divider span{font-family:'Inter',sans-serif;font-size:.7rem;color:rgba(255,255,255,.28);font-weight:600;letter-spacing:.7px;text-transform:uppercase}

/* ── Error ── */
.error-msg{background:rgba(239,68,68,.13);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:11px 14px;color:#fca5a5;font-size:.82rem;font-weight:500;margin-bottom:20px;font-family:'Inter',sans-serif}

/* ── Fields ── */
.field{margin-bottom:16px}
.field label{display:block;margin-bottom:7px;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.7px;text-transform:uppercase}
.field input{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);border-radius:12px;
  padding:13px 16px;font-size:.9rem;font-family:inherit;color:#fff;outline:none;
  transition:border-color .2s,background .2s,box-shadow .2s;
}
.field input::placeholder{color:rgba(255,255,255,.22)}
.field input:focus{border-color:rgba(99,102,241,.65);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(99,102,241,.18)}

/* ── Submit ── */
.btn-submit{
  width:100%;border:none;border-radius:14px;padding:14px 20px;
  background:linear-gradient(135deg,var(--indigo),var(--purple));
  color:#fff;font-size:.93rem;font-weight:800;
  cursor:pointer;font-family:'Inter',sans-serif;
  box-shadow:0 4px 20px rgba(99,102,241,.4);
  transition:transform .15s,box-shadow .2s,opacity .2s;
  margin-top:6px;
}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(99,102,241,.55)}
.btn-submit:active{transform:none;opacity:.9}

/* ── Footer link ── */
.card-footer{margin-top:22px;text-align:center;font-family:'Inter',sans-serif;font-size:.78rem;color:rgba(255,255,255,.28)}
.card-footer a{color:#818cf8;text-decoration:none;font-weight:700;transition:color .2s}
.card-footer a:hover{color:#a5b4fc}

/* ── Back link ── */
.back-link{
  position:fixed;top:24px;left:28px;z-index:10;
  display:flex;align-items:center;gap:7px;
  color:rgba(255,255,255,.45);text-decoration:none;
  font-family:'Inter',sans-serif;font-size:.8rem;font-weight:700;
  background:rgba(255,255,255,.06);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:8px 18px;
  transition:color .2s,background .2s;
}
.back-link:hover{color:#fff;background:rgba(255,255,255,.1)}
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<a href="{% url 'landing' %}" class="back-link">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  Volver
</a>

<div class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-logo">
        <img src="{% static 'logo.png' %}" alt="SkedyClass">
      </div>
      <div style="text-align:center">
        <div class="brand-name"><span class="blue">Skedy</span><span class="pink">Class</span></div>
        <div class="brand-sub">Planificador de clases</div>
      </div>
    </div>

    <a href="{% url 'google_oauth_start' %}" class="btn-google">
      <svg class="g-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </a>

    <div class="divider"><span>o usa tu cuenta</span></div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <div class="field">
        <label>Usuario</label>
        <input type="text" name="username" placeholder="Ingresa tu usuario" required autofocus>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
      </div>
      <button type="submit" class="btn-submit">Iniciar sesión</button>
    </form>

    <div class="card-footer">
      ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a>
    </div>

  </div>
</div>

</body>
</html>
