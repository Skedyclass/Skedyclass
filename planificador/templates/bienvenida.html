{% load static %}
<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bienvenido — SkedyClass</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet"><style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --indigo: #6366f1; --violet: #8b5cf6; --pink: #ec4899; }
html, body { height: 100%; font-family: 'Lora', Georgia, serif; }
.bg { position: fixed; inset: 0; z-index: 0; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
.bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .5; animation: orb linear infinite; }
.orb1 { width: 700px; height: 700px; background: #6366f1; top: -200px; left: -200px; animation-duration: 20s; }
.orb2 { width: 600px; height: 600px; background: #8b5cf6; bottom: -200px; right: -200px; animation-duration: 26s; animation-delay: -8s; }
.orb3 { width: 400px; height: 400px; background: #ec4899; top: 40%; left: 40%; animation-duration: 16s; animation-delay: -4s; }
@keyframes orb { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(40px,-30px) scale(1.06); } 66% { transform: translate(-25px,40px) scale(.95); } 100% { transform: translate(0,0) scale(1); } }
.page { position: relative; z-index: 1; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card { width: 100%; max-width: 500px; text-align: center; background: rgba(255,255,255,.08); backdrop-filter: blur(32px) saturate(180%); -webkit-backdrop-filter: blur(32px) saturate(180%); border: 1px solid rgba(255,255,255,.18); border-radius: 28px; padding: 64px 48px; box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.25); animation: card-in .7s cubic-bezier(.22,1,.36,1) both; }
@keyframes card-in { from { opacity: 0; transform: translateY(32px) scale(.96); } to { opacity: 1; transform: none; } }
.check-circle { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--indigo), var(--pink)); display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; box-shadow: 0 12px 40px rgba(99,102,241,.5); animation: pop .5s cubic-bezier(.34,1.56,.64,1) .3s both; }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
.check-circle svg { color: #fff; }
h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; color: #fff; margin-bottom: 16px; line-height: 1.15; }
.subtitle { font-size: 1rem; color: rgba(255,255,255,.6); line-height: 1.7; margin-bottom: 40px; }
.btn-dashboard { display: inline-flex; align-items: center; gap: 10px; background: linear-gradient(135deg, var(--indigo), var(--violet)); color: #fff; text-decoration: none; border-radius: 50px; padding: 16px 40px; font-size: 1rem; font-weight: 700; box-shadow: 0 6px 24px rgba(99,102,241,.45); transition: transform .2s, box-shadow .2s; }
.btn-dashboard:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(99,102,241,.6); }
</style></head><body>
<div class="bg"><div class="bg-orb orb1"></div><div class="bg-orb orb2"></div><div class="bg-orb orb3"></div></div>
<div class="page"><div class="card">
  <div class="check-circle">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Bienvenido a SkedyClass</h1>
  <p class="subtitle">Tu cuenta ha sido creada exitosamente.<br>Ya puedes comenzar a organizar tus clases.</p>
  <a href="{% url 'dashboard' %}" class="btn-dashboard">
    Ir al Dashboard
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
</div></div>
</body></html>
